services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       kpi_dashboard
      POSTGRES_USER:     kpi
      POSTGRES_PASSWORD: kpi123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kpi -d kpi_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Go backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgres://kpi:kpi123@db:5432/kpi_dashboard?sslmode=disable
      TOKEN:  pk_107627547_EQSQELUF5LVO8HIGB2Z5W67V7LLDBUB4
      TZ:     Asia/Ho_Chi_Minh
    depends_on:
      db:
        condition: service_healthy

  # ── React frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
